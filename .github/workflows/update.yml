name: JanAushadhi Data Sync

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday midnight
  workflow_dispatch: # Allows manual triggering of the workflow from the GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Processors
        env:
          JANAUSHADHI_TOKEN: ${{ secrets.JANAUSHADHI_TOKEN }}
        run: |
          # Run Kendra Processor
          python kendra_processor.py > kendra_out.txt
          echo "K_COUNT=$(grep RESULT_COUNT kendra_out.txt | cut -d'=' -f2)" >> $GITHUB_ENV
          
          # Run Product Processor
          python product_processor.py > product_out.txt
          echo "P_COUNT=$(grep RESULT_COUNT product_out.txt | cut -d'=' -f2)" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/
          git commit -m "Weekly Sync: ${{ env.K_COUNT }} Kendras, ${{ env.P_COUNT }} Products" || echo "No changes"
          git push

      - name: Telegram Notification
        if: always()
        run: |
          MSG="📊 *JanAushadhi Sync Complete* %0A%0A🏪 Kendras: ${{ env.K_COUNT }} %0A💊 Products: ${{ env.P_COUNT }} %0A📅 Date: $(date +'%Y-%m-%d')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$MSG&parse_mode=Markdown"